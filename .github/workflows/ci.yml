name: Java CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]


jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        - silo/useCases/fabiland # also contained in silo/useCases, but I want that result faster
        - silo/siloCore
        - silo/analysis
        - silo/extensions
        - silo/synthetic-population
        - silo/useCases

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '21'
      - name: Build with Maven
        run: mvn test --fail-at-end --batch-mode -Dmatsim.preferLocalDtds=true
